name: CI

on:
  pull_request:
  push:
    branches: [master]

jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          load: true
          push: false
          tags: marimo-binder:ci

      - name: "Smoke: entrypoint starts marimo"
        run: |
          set -euo pipefail
          docker run --rm --entrypoint /bin/bash marimo-binder:ci -lc '
            set -euo pipefail
            /home/jovyan/.binder/start true
            sleep 1
            ps aux | grep -F "marimo edit notebook.py" | grep -v grep
          '
