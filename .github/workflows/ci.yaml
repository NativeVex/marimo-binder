name: CI

on:
  pull_request:
  push:
    branches: [master]

jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          load: true
          push: false
          tags: marimo-binder:ci

  docker-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t marimo-binder:ci .

      - name: "Smoke: shipped versions (informational)"
        run: |
          set -euo pipefail
          docker run --rm --entrypoint /bin/bash marimo-binder:ci -lc '
            set -euo pipefail
            python3 -c "import marimo, marimo_jupyter_extension; print(\"marimo\", getattr(marimo, \"__version__\", \"?\")); print(\"marimo_jupyter_extension\", getattr(marimo_jupyter_extension, \"__version__\", \"?\"))"
          '

      - name: "Smoke: entrypoint starts marimo"
        run: |
          set -euo pipefail
          docker run --rm --entrypoint /bin/bash marimo-binder:ci -lc '
            set -euo pipefail
            /home/jovyan/.binder/start true
            sleep 1
            ps aux | grep -F "marimo run marimo_app.py" | grep -v grep
          '
