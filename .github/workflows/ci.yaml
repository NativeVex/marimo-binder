name: CI

on:
  pull_request:
  push:
    branches: [master]

jobs:
  contract-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: "Contract tests: embedded Grist wiring"
        run: python3 -m unittest discover -s tests -p 'test*.py' -v

  grist-runtime-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: "Smoke: Grist runtime defaults"
        run: ./scripts/grist-runtime-smoke.sh

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # NOTE: We intentionally use `docker build` here rather than `docker/build-push-action`.
      # In practice we observed the action-based Buildx path can hang and then the runner dies
      # without uploading logs, leaving the step stuck "in_progress".
      - name: Build image
        run: docker build -f .binder/Dockerfile -t marimo-binder:ci .

  docker-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: "Smoke: build and run image checks"
        run: IMAGE=marimo-binder:ci ./scripts/docker-smoke.sh

  cml-comment:
    runs-on: ubuntu-latest
    needs: [docker-smoke]
    if: github.event_name == 'pull_request'
    container: ghcr.io/iterative/cml:0-dvc2-base1
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      # NOTE: We run inside the official CML container so this job is stable
      # under both GitHub Actions and local `act` (avoids Node/ABI + canvas builds).

      - name: "CML: comment Binder link"
        shell: bash
        env:
          REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # Use PR head ref when available; fall back to ref name for pushes.
          REF="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"

          cat > report.md <<'MD'
          ## Binder preview

          Launch directly into the marimo UI:

          MD

          echo "mybinder.org (app): https://mybinder.org/v2/gh/${GITHUB_REPOSITORY}/${REF}?urlpath=proxy%2F2718%2F" >> report.md
          echo "mybinder.org (dev): https://mybinder.org/v2/gh/${GITHUB_REPOSITORY}/${REF}?urlpath=proxy%2F2719%2F" >> report.md
          echo "mybinder.org (grist): https://mybinder.org/v2/gh/${GITHUB_REPOSITORY}/${REF}?urlpath=proxy%2F8484%2Fo%2Fdocs%2F" >> report.md
          echo "" >> report.md
          echo "binderhub.saucy.haus (app): https://binderhub.saucy.haus/v2/gh/${GITHUB_REPOSITORY}/${REF}?urlpath=proxy%2F2718%2F" >> report.md
          echo "binderhub.saucy.haus (dev): https://binderhub.saucy.haus/v2/gh/${GITHUB_REPOSITORY}/${REF}?urlpath=proxy%2F2719%2F" >> report.md
          echo "binderhub.saucy.haus (grist): https://binderhub.saucy.haus/v2/gh/${GITHUB_REPOSITORY}/${REF}?urlpath=proxy%2F8484%2Fo%2Fdocs%2F" >> report.md

          cat >> report.md <<'MD'

          Notes:
          - CI `docker-smoke` verifies `.binder/start` starts:
            - `marimo run marimo_app.py` (app, 2718)
            - `marimo edit marimo_app.py` (dev, 2719)
            - embedded Grist (`gristlabs/grist:1.7.14`, 8484)
          - Binder builds from the branch/ref above; availability depends on Binder queue/build time.
          - The default image intentionally stays lightweight; the optional embeddings demo uses `requirements-heavy.txt` plus an explicit `MARIMO_APP` override.
          MD

          # Local `act` runs are not expected to post PR comments; skip.
          if [ -n "${ACT:-}" ]; then
            echo "NOTE: ACT is set; skipping PR comment (local run)."
            cat report.md
            exit 0
          fi

          # Also skip if no token was provided.
          if [ -z "${REPO_TOKEN:-}" ]; then
            echo "NOTE: REPO_TOKEN is empty; skipping PR comment."
            cat report.md
            exit 0
          fi

          cml comment create report.md
